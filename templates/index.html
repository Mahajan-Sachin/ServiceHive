<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AutoStream AI – Get instant answers about pricing, features, and sign up for automated video editing tools." />
    <title>AutoStream AI – Sales Agent</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<div class="chat-wrapper">

    <!-- Header -->
    <div class="chat-header">
        <div class="bot-avatar">🎬</div>
        <div class="header-info">
            <h1>AutoStream AI</h1>
            <div class="status">
                <span class="status-dot"></span>
                Online – Ask me anything
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div id="chat" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <!-- Input -->
    <div class="input-area">
        <input
            id="msg"
            type="text"
            placeholder="Ask about pricing, plans, or get started..."
            autocomplete="off"
            aria-label="Type your message"
        />
        <button id="send-btn" onclick="sendMessage()" aria-label="Send message">
            Send ↑
        </button>
    </div>
    <div class="input-hint">Press Enter to send &nbsp;·&nbsp; Powered by AutoStream AI</div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
